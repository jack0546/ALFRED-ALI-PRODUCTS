<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electronics - ALFRED PRODUCTS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0abf53">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="new_logo.png">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <script src="script.js"></script>
</head>

<body>
    <!-- Floating Menu Button -->
    <div class="floating-menu-container">
        <button class="floating-menu-btn" onclick="toggleFloatingMenu()">
            <ion-icon name="menu-outline"></ion-icon>
        </button>
        <div class="floating-menu-dropdown" id="floatingMenu">
            <a href="login.html" class="floating-menu-item">
                <ion-icon name="person-outline"></ion-icon>
                <span>Sign In</span>
            </a>
            <a href="messages.html" class="floating-menu-item">
                <ion-icon name="mail-outline"></ion-icon>
                <span>Messages</span>
            </a>
            <div class="floating-menu-item floating-orders-btn" onclick="toggleOrdersSection()">
                <ion-icon name="cart-outline"></ion-icon>
                <span>Orders</span>
                <ion-icon name="chevron-down-outline" class="orders-chevron"></ion-icon>
            </div>
            <div class="floating-orders-section" id="floatingOrdersSection">
                <div id="floatingOrdersList">
                    <div style="padding: 15px; text-align: center; color: #999; font-size: 13px;">
                        <ion-icon name="bag-handle-outline" style="font-size: 24px;"></ion-icon><br>
                        No Order
                    </div>
                </div>
            </div>
        </div>
    </div>

    <header>
        <div class="container">
            <div class="header-top" style="padding: 15px 0;">
                <div class="logo">
                    <a href="index.html"><img src="new_logo.png" alt="ALFRED PRODUCTS Logo" style="height: 28px;"></a>
                </div>
                <div class="header-actions">
                    <a href="login.html" class="action-item"><ion-icon name="person-outline"></ion-icon><span>Sign In</span></a>
                    <a href="messages.html" class="action-item"><ion-icon name="mail-outline"></ion-icon><span>Messages</span></a>
                    <a href="orders.html" class="action-item"><ion-icon name="cart-outline"></ion-icon><span>Orders</span></a>
                </div>
                <nav>
                    <ul>
                        <li><a href="categories.html"><ion-icon name="apps-outline"></ion-icon> All Categories</a></li>
                        <li><a href="index.html">Home</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- EDITABLE CATEGORY HEADER -->
        <section class="category-hero"
            style="margin-top: 30px; border-radius: 12px; overflow: hidden; position: relative; height: 300px; background: #eee;">
            <!-- 1. CHANGE CATEGORY BANNER HERE -->
            <img src="images/banners/electronics_main.jpg"
                onerror="this.src='https://images.unsplash.com/photo-1498049794561-7780e7231661?w=1200'; this.onerror=null;"
                alt="Consumer Electronics" style="width: 100%; height: 100%; object-fit: cover;">

            <div
                style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.4), transparent); display: flex; flex-direction: column; justify-content: flex-end; padding: 40px; color: white;">
                <!-- 2. CHANGE CATEGORY TITLE HERE -->
                <h1 style="font-size: 36px; font-weight: 800; margin-bottom: 5px;">Consumer Electronics</h1>
                <!-- 3. CHANGE CATEGORY DESCRIPTION HERE -->
                <p style="font-size: 16px; opacity: 0.9;">Source top-rated gadgets and consumer tech from world-class
                    factories.</p>
            </div>
        </section>

        <section class="products" style="margin-top: 50px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <h2 style="font-size: 20px; font-weight: 800;">Wholesale Product Listings</h2>
                <div style="font-size: 14px; color: var(--text-muted);">
                    <a href="categories.html" style="color: var(--primary-color); text-decoration: none;">View all
                        markets →</a>
                </div>
            </div>
            <div class="product-grid" id="productGrid">
                <!-- script.js will load electronics by cat=electronics -->
            </div>
        </section>
    </main>

    <footer style="margin-top: 100px;">
        <div class="container" style="text-align: center; border-top: 1px solid #eee; padding: 40px 0;">
            <p style="color: grey; font-size: 13px;">&copy; 2026 ALFRED PRODUCTS. Global Trade Starts Here.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        // Floating Menu Functions
        function toggleFloatingMenu() {
            const menu = document.getElementById('floatingMenu');
            menu.classList.toggle('active');
        }
        
        function toggleOrdersSection() {
            const section = document.getElementById('floatingOrdersSection');
            const chevron = section.previousElementSibling.querySelector('.orders-chevron');
            section.classList.toggle('active');
            chevron.classList.toggle('rotated');
            
            if (typeof firebase !== 'undefined' && firebase.auth()) {
                firebase.auth().onAuthStateChanged((user) => {
                    if (user) {
                        loadFloatingOrders(user.uid);
                    }
                });
            }
        }
        
        function loadFloatingOrders(uid) {
            const container = document.getElementById('floatingOrdersList');
            if (typeof db !== 'undefined') {
                db.collection("orders").where("userId", "==", uid).orderBy("timestamp", "desc").limit(5).get()
                    .then((querySnapshot) => {
                        if (querySnapshot.empty) {
                            container.innerHTML = '<div style="padding: 15px; text-align: center; color: #999; font-size: 13px;"><ion-icon name="bag-handle-outline" style="font-size: 24px;"></ion-icon><br>No Order</div>';
                            return;
                        }
                        let ordersHTML = '';
                        querySnapshot.forEach((doc) => {
                            const order = doc.data();
                            const firstItem = order.items[0];
                            ordersHTML += '<a href="orders.html" class="floating-order-item"><img src="' + (firstItem.image || 'new_logo.png') + '" alt="Product" style="width: 40px; height: 40px; object-fit: cover; border-radius: 6px;"><div style="flex: 1; overflow: hidden;"><p style="font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">' + firstItem.title + '</p><p style="font-size: 11px; color: #999;">' + order.items.length + ' item(s) • GHS ' + parseFloat(order.total).toFixed(2) + '</p></div></a>';
                        });
                        container.innerHTML = ordersHTML;
                    })
                    .catch((error) => {
                        container.innerHTML = '<div style="padding: 15px; text-align: center; color: #999; font-size: 13px;"><ion-icon name="bag-handle-outline" style="font-size: 24px;"></ion-icon><br>No Order</div>';
                    });
            } else {
                container.innerHTML = '<div style="padding: 15px; text-align: center; color: #999; font-size: 13px;"><ion-icon name="bag-handle-outline" style="font-size: 24px;"></ion-icon><br>No Order</div>';
            }
        }
        
        document.addEventListener('click', function(e) {
            const menuContainer = document.querySelector('.floating-menu-container');
            const menu = document.getElementById('floatingMenu');
            if (menuContainer && !menuContainer.contains(e.target)) {
                menu.classList.remove('active');
            }
        });
    </script>
</body>

</html>
