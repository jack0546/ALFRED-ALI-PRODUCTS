<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Setup - ALFRED</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;  
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #333; margin-bottom: 10px; font-size: 28px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #444; font-weight: 500; }
        input { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #e0e0e0; 
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: #667eea; }
        
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        .btn-primary {
            background: #667eea;
            color: white;
            margin-bottom: 10px;
        }
        .btn-primary:hover { background: #5568d3; transform: translateY(-2px); }
        
        .btn-danger {
            background: #ff4757;
            color: white;
        }
        .btn-danger:hover { background: #ff6b81; transform: translateY(-2px); }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .result.success { background: #d4edda; color: #155724; display: block; }
        .result.error { background: #f8d7da; color: #721c24; display: block; }
        .result.loading { background: #fff3cd; color: #856404; display: block; }
        
        .note {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 14px;
            color: #666;
        }
        .note strong { color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ Admin Setup</h1>
        <p class="subtitle">Set admin Custom Claims for a user</p>
        
        <div class="form-group">
            <label>User Email</label>
            <input type="email" id="adminEmail" placeholder="admin@example.com" value="narhsnazzisco@gmail.com">
        </div>
        
        <button class="btn btn-primary" onclick="setAdmin()">
            ✅ Set as Admin
        </button>
        
        <button class="btn btn-danger" onclick="removeAdmin()">
            ❌ Remove Admin
        </button>
        
        <div id="result" class="result"></div>
        
        <div class="note">
            <strong>Note:</strong> This tool uses Firebase Cloud Functions to set Custom Claims.
            Make sure you've deployed the functions first:
            <code>firebase deploy --only functions</code>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-functions-compat.js"></script>
    <script src="firebase-config.js"></script>
    
    <script>
        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const functions = firebase.functions();
        
        function showResult(message, type) {
            const result = document.getElementById('result');
            result.className = 'result ' + type;
            result.textContent = message;
        }
        
        async function setAdmin() {
            const email = document.getElementById('adminEmail').value;
            
            if (!email) {
                showResult('Please enter an email address', 'error');
                return;
            }
            
            showResult('Setting admin...', 'loading');
            
            try {
                const setAdminClaim = firebase.functions().httpsCallable('setAdminClaim');
                const result = await setAdminClaim({ email: email, isAdmin: true });
                
                showResult('✅ Success! ' + email + ' is now an admin.\nCustom Claims have been set.', 'success');
                
            } catch (error) {
                console.error('Error:', error);
                showResult('❌ Error: ' + error.message, 'error');
            }
        }
        
        async function removeAdmin() {
            const email = document.getElementById('adminEmail').value;
            
            if (!email) {
                showResult('Please enter an email address', 'error');
                return;
            }
            
            showResult('Removing admin...', 'loading');
            
            try {
                const setAdminClaim = firebase.functions().httpsCallable('setAdminClaim');
                const result = await setAdminClaim({ email: email, isAdmin: false });
                
                showResult('✅ Success! Admin removed from ' + email, 'success');
                
            } catch (error) {
                console.error('Error:', error);
                showResult('❌ Error: ' + error.message, 'error');
            }
        }
    </script>
</body>
</html>
