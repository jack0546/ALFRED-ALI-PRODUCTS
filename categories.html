    <style>
        .category-explorer {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 30px;
            margin-top: 30px;
        }

        .category-nav {
            position: sticky;
            top: 100px;
            height: calc(100vh - 120px);
            overflow-y: auto;
            background: white;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        .category-nav h3 {
            font-size: 16px;
            margin-bottom: 20px;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .category-nav ul {
            list-style: none;
        }

        .category-nav li {
            padding: 8px 0;
        }

        .category-nav a {
            text-decoration: none;
            color: var(--text-color);
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s;
            display: block;
        }

        .category-nav a:hover {
            color: var(--primary-color);
            padding-left: 5px;
        }

        .category-section {
            margin-bottom: 60px;
            scroll-margin-top: 100px;
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--primary-color);
        }

        .category-header h3 {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-color);
        }

        .category-header .view-all {
            font-size: 14px;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 700;
        }

        .sub-category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .sub-category-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            color: inherit;
            text-align: center;
            display: flex;
            flex-direction: column;
        }

        .sub-category-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            border-color: var(--primary-color);
        }

        .sub-category-img {
            height: 140px;
            overflow: hidden;
            background: #f7f7f7;
            position: relative;
        }

        .sub-category-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .sub-category-card:hover .sub-category-img img {
            transform: scale(1.1);
        }

        .sub-category-name {
            font-size: 13px;
            font-weight: 600;
            padding: 12px 10px;
            display: block;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.4;
        }

        @media (max-width: 900px) {
            .category-explorer {
                grid-template-columns: 1fr;
            }

            .category-nav {
                display: none;
            }
        }
    </style>
