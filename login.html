<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - ALFRED PRODUCTS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body style="background: var(--bg-light);">
    <div class="container" style="text-align: center; margin-top: 40px;">
        <a href="index.html"><img src="1.png" alt="ALFRED PRODUCTS Logo" style="height: 40px;"></a>
    </div>

    <main class="auth-container">
        <div class="auth-header">
            <h2>Sign In</h2>
            <p style="color: var(--text-muted); font-size: 14px; margin-top: 5px;">WELCOME TO ALFRED PRODUCTS</p>
        </div>
        <form action="#">
            <div class="form-group">
                <label>Account</label>
                <input type="text" placeholder="Email or Member ID" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Password" required>
            </div>
            <div style="margin-bottom: 20px; text-align: right;">
                <a href="#" style="color: var(--primary-color); font-size: 13px; text-decoration: none;">Forgot password?</a>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: 8px;">Sign In</button>
        </form>

        <div style="margin-top: 30px; text-align: center; position: relative;">
            <hr style="border: none; border-top: 1px solid var(--border-color);">
            <span style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--white); padding: 0 10px; font-size: 12px; color: var(--text-muted);">OR</span>
        </div>

        <div style="margin-top: 25px; display: flex; gap: 15px; justify-content: center;">
            <button class="btn btn-outline" style="flex: 1; font-size: 14px; padding: 10px; border-radius: 8px;">
                <ion-icon name="logo-google" style="vertical-align: middle; margin-right: 5px;"></ion-icon> Google
            </button>
            <button class="btn btn-outline" style="flex: 1; font-size: 14px; padding: 10px; border-radius: 8px;">
                <ion-icon name="logo-apple" style="vertical-align: middle; margin-right: 5px;"></ion-icon> Apple
            </button>
        </div>

        <div class="auth-footer">
            Don't have an account? <a href="register.html">Join Free</a>
        </div>
    </main>

    <footer style="margin-top: 80px;">
        <div class="container" style="text-align: center; color: #999; font-size: 12px;">
            <p>&copy; 1999-2026 Alibaba.com. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
