<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - ALFRED PRODUCTS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF6600">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="1.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <meta name="google-signin-client_id" content="856741060528-u5vr34fu5sppbbhbd75it3p93nthk65r.apps.googleusercontent.com">
</head>
<body style="background: var(--bg-light);">
    <div class="container" style="text-align: center; margin-top: 40px;">
        <a href="index.html"><img src="1.png" alt="ALFRED PRODUCTS Logo" style="height: 40px;"></a>
    </div>

    <main class="auth-container">
        <div class="auth-header">
            <h2>Sign In</h2>
            <p style="color: var(--text-muted); font-size: 14px; margin-top: 5px;">WELCOME TO ALFRED PRODUCTS</p>
        </div>
        
        <button class="btn btn-outline" onclick="signInWithGoogle()" style="width: 100%; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px;">
            <ion-icon name="logo-google" style="font-size: 20px; color: #4285F4;"></ion-icon> Continue with Google
        </button>

        <div style="text-align: center; position: relative; margin: 20px 0;">
            <hr style="border: none; border-top: 1px solid var(--border-color);">
            <span style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--white); padding: 0 10px; font-size: 12px; color: var(--text-muted);">OR LOGIN WITH EMAIL</span>
        </div>

        <form action="#">
            <div class="form-group">
                <label>Account</label>
                <input type="text" placeholder="Email or Member ID" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: 8px;">Sign In</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="register.html">Join Free</a>
        </div>
    </main>

    <footer style="margin-top: 80px; padding-bottom: 40px;">
        <div class="container" style="text-align: center; color: #999; font-size: 12px;">
            <p>&copy; 2026 ALFRED PRODUCTS. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
