<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - ALFRED</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF6B35">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="new_logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #FF6B35 0%, #FF477E 50%, #7B61FF 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .auth-card {
            background: white;
            border-radius: 20px;
            padding: 32px 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-container img {
            height: 36px;
        }

        .auth-title {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin: 0 0 8px 0;
            color: #1A1A1A;
        }

        .auth-subtitle {
            font-size: 14px;
            color: #5A5A5A;
            text-align: center;
            margin: 0 0 24px 0;
        }

        .google-btn {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #E5E5E5;
            border-radius: 10px;
            background: white;
            font-size: 15px;
            font-weight: 500;
            color: #1A1A1A;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            transition: all 0.2s;
        }

        .google-btn:hover {
            background: #F8F9FA;
            border-color: #D0D0D0;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: #E5E5E5;
        }

        .divider-text {
            padding: 0 16px;
            font-size: 12px;
            color: #8E8E8E;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1A1A1A;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #E5E5E5;
            border-radius: 10px;
            font-size: 15px;
            background: #F8F9FA;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        .form-input:focus {
            border-color: #FF6B35;
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        .remember-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .remember-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-checkbox input {
            width: 16px;
            height: 16px;
        }

        .forgot-link {
            color: #FF6B35;
            font-weight: 500;
            text-decoration: none;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #FF6B35 0%, #E55A2B 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #5A5A5A;
        }

        .auth-footer a {
            color: #FF6B35;
            font-weight: 600;
            text-decoration: none;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            .auth-container {
                padding: 16px;
            }
            
            .auth-card {
                padding: 24px 20px;
                border-radius: 16px;
            }
            
            .auth-title {
                font-size: 22px;
            }
            
            .logo-container img {
                height: 32px;
            }
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo-container">
                <a href="index.html">
                    <img src="new_logo.png" alt="ALFRED">
                </a>
            </div>

            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-subtitle">Sign in to continue to ALFRED</p>

            <button class="google-btn" onclick="signInWithGoogle()">
                <ion-icon name="logo-google" style="font-size: 20px; color: #4285F4;"></ion-icon>
                Continue with Google
            </button>

            <div class="divider">
                <div class="divider-line"></div>
                <span class="divider-text">or sign in with email</span>
                <div class="divider-line"></div>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                </div>
                <div class="remember-row">
                    <label class="remember-checkbox">
                        <input type="checkbox">
                        Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>
                <button type="submit" class="submit-btn">Sign In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Create one</a>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const redirectUrl = urlParams.get('redirect') || 'index.html';
        
        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            firebase.auth().signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    saveUserToFirestore(user);
                    // Check if admin email and redirect accordingly
                    if (email.toLowerCase() === 'narhsnazzisco@gmail.com') {
                        window.location.href = 'admin-dashboard/admin-dashboard.html';
                    } else {
                        // Regular users go to profile page
                        window.location.href = 'profile.html';
                    }
                })
                .catch((error) => {
                    alert('Login failed: ' + error.message);
                });
        }

        function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider)
                .then((result) => {
                    const user = result.user;
                    saveUserToFirestore(user);
                    // Check if admin email and redirect accordingly
                    if (user.email.toLowerCase() === 'narhsnazzisco@gmail.com') {
                        window.location.href = 'admin-dashboard/admin-dashboard.html';
                    } else {
                        // Regular users go to profile page
                        window.location.href = 'profile.html';
                    }
                })
                .catch((error) => {
                    alert('Google sign-in failed: ' + error.message);
                });
        }

        function saveUserToFirestore(user) {
            if (typeof db !== 'undefined') {
                const isAdmin = user.email.toLowerCase() === 'narhsnazzisco@gmail.com';
                db.collection('users').doc(user.uid).set({
                    email: user.email,
                    displayName: user.displayName || user.email.split('@')[0],
                    photoURL: user.photoURL,
                    phoneNumber: user.phoneNumber,
                    isAdmin: isAdmin,
                    createdAt: new Date(),
                    lastLogin: new Date()
                }, { merge: true });
            }
        }
    </script>
</body>

</html>
