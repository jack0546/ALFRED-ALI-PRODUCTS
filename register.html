<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Free - ALFRED PRODUCTS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body style="background: var(--bg-light);">
    <div class="container" style="text-align: center; margin-top: 40px;">
        <a href="index.html"><img src="1.png" alt="ALFRED PRODUCTS Logo" style="height: 40px;"></a>
    </div>

    <main class="auth-container" style="max-width: 550px;">
        <div class="auth-header">
            <h2>Join Free</h2>
            <p style="color: var(--text-muted); font-size: 14px; margin-top: 5px;">Expand your business possibilities</p>
        </div>
        <form action="#">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" placeholder="First Name" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" placeholder="Last Name" required>
                </div>
            </div>
            <div class="form-group">
                <label>Company Name</label>
                <input type="text" placeholder="Your business name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="example@business.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Create a password" required>
            </div>
            <div style="margin-bottom: 25px; display: flex; align-items: flex-start; gap: 10px;">
                <input type="checkbox" id="terms" style="margin-top: 4px;" required>
                <label for="terms" style="font-size: 12px; color: var(--text-muted); line-height: 1.4;">
                    I agree to the <a href="#" style="color: var(--primary-color);">Free Membership Agreement</a> and <a href="#" style="color: var(--primary-color);">Privacy Policy</a>.
                </label>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: 8px;">Create Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Sign In</a>
        </div>
    </main>

    <footer style="margin-top: 80px;">
        <div class="container" style="text-align: center; color: #999; font-size: 12px;">
            <p>&copy; 1999-2026 Alibaba.com. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
